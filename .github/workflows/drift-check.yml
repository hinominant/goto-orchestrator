name: Agent Drift Check

on:
  pull_request:
    paths:
      - 'agents/**'
      - 'agents/_base.tmpl'
      - '_templates/hooks/**'
      - '_common/TOOL_RISK.md'
      - '_common/DUAL_CHECK.md'
      - 'scripts/auto-repair.js'
      - 'skills/**'

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      # SHA pinned for supply-chain hardening (GlassWorm対策)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check agent SKILL.md drift
        run: |
          chmod +x scripts/check-drift.sh
          scripts/check-drift.sh
